<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      NOTA: title, meta description, canonical, Open Graph y Twitter Cards
      son inyectados PÁGINA A PÁGINA por react-helmet (ver src/pages/**).
      No los pongas aquí: si los pones, Helmet añade un duplicado en runtime
      y Google ve dos meta description / canonicals → SEO penaliza.
      scripts/prerender.js renderiza cada ruta en Node y escribe el HTML con
      el body completo. Fallback si una ruta llega sin prerender: el noscript.
    -->

    <meta name="author" content="esGEO" />
    <meta name="keywords" content="GEO, Generative Engine Optimization, IA, ChatGPT, Perplexity, Claude, optimización, contenido" />

    <!-- Favicon -->
    <link rel="icon" href="/lovable-uploads/914520d2-ad27-47bc-ad01-81185b80dbaf.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "tjc7zvjx9g");
    </script>

    <!-- Crawler directives — global, NO duplican Helmet -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="bingbot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- ESTRATEGIA HÍBRIDA GEO: Enlaces a contenido citable -->
    <meta name="ai-content-files" content="/home.geo.txt, /curso.geo.txt, /metodologia.geo.txt, /glosario.geo.txt" />
    <meta name="citation_fulltext_world_readable" content="https://esgeo.ai/home.geo.txt" />
    <meta name="citation_pdf_url" content="https://esgeo.ai/contenido-ia" />

    <!-- Speakable -->
    <meta name="speakable-selector" content=".snippet-block, [data-speakable='true'], .geo-card" />

    <!-- Structured Data — global Org + Website + Course (las páginas añaden Article/FAQ específicos) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://www.esgeo.ai#website",
          "name": "esGEO",
          "alternateName": "Generative Engine Optimization España",
          "url": "https://www.esgeo.ai",
          "description": "La primera plataforma en español centrada en enseñar cómo estructurar y redactar webs para que los modelos de lenguaje como ChatGPT, Perplexity o Claude las comprendan, recomienden y citen.",
          "inLanguage": "es-ES",
          "datePublished": "2025-01-01",
          "dateModified": "2026-07-13",
          "publisher": { "@id": "https://www.esgeo.ai#organization" }
        },
        {
          "@type": ["Organization", "EducationalOrganization"],
          "@id": "https://www.esgeo.ai#organization",
          "name": "esGEO",
          "url": "https://www.esgeo.ai",
          "logo": "https://www.esgeo.ai/logo.png",
          "description": "Plataforma líder en Generative Engine Optimization en español.",
          "foundingDate": "2025-01-01",
          "slogan": "Optimiza para ser citado por la IA",
          "knowsAbout": ["Generative Engine Optimization", "Optimización para IA", "SEO Técnico", "Datos Estructurados", "Citabilidad por LLMs"],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "email": "hola@esgeo.ai"
          },
          "disambiguatingDescription": "Plataforma española de Generative Engine Optimization; sin relación con ESGeo Sustainability Intelligence"
        },
        {
          "@type": "Course",
          "@id": "https://www.esgeo.ai#course",
          "name": "Framework F1-F5 de GEO",
          "description": "Metodología completa de Generative Engine Optimization en 5 módulos: accesibilidad, contexto semántico, autoridad, validación y mantenimiento.",
          "url": "https://www.esgeo.ai/curso",
          "provider": { "@id": "https://www.esgeo.ai#organization" },
          "courseCode": "GEO-F1F5",
          "educationalLevel": "Intermedio",
          "inLanguage": "es-ES",
          "offers": {
            "@type": "Offer",
            "price": "47",
            "priceCurrency": "EUR",
            "availability": "https://schema.org/InStock",
            "url": "https://www.esgeo.ai/curso#comprar"
          },
          "hasCourseInstance": {
            "@type": "CourseInstance",
            "courseMode": "online",
            "location": { "@type": "VirtualLocation", "url": "https://www.esgeo.ai/curso" }
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <noscript>
      <p>esGEO — Plataforma de Generative Engine Optimization en español. Visita <a href="https://www.esgeo.ai">esgeo.ai</a> para aprender a optimizar tu contenido para IA.</p>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
